services:
  # FastAPI Backend
  - type: web
    name: medchat-api
    env: python
    plan: free
    buildCommand: "uv sync"
    startCommand: "./start.sh"
    autoDeploy: true

  # Streamlit Frontend
  - type: web
    name: medchat-ui
    env: python
    plan: free
    buildCommand: "uv sync"
    startCommand: "streamlit run app/streamlit_app.py --server.port $PORT --server.address 0.0.0.0"
    autoDeploy: true
