# render.yaml
services:
  - type: web
    name: medchat-ai
    env: python
    plan: free

    # 👇 These are the setup commands Render runs before your app starts
    buildCommand: |
      chmod +x start.sh
      uv sync

    # 👇 Render runs this to start your combined app (FastAPI + Streamlit)
    startCommand: ./start.sh

    # 👇 Environment variables (add your real Gemini API key in Render dashboard)
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: PORT
        value: 10000  # Render assigns this automatically; just in case

    # 👇 Optional: specify region (helps with latency)
    region: oregon
